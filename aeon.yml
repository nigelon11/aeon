  idea-pipeline: { enabled: false, schedule: "0 18 * * 1" } # Monday — execution-gap audit: top 3 backlog ideas to build this week

  # Self-maintenance / meta
  batch-health: { enabled: false, schedule: "30 8 * * *" } # daily — verify enabled morning-batch skills fired; alert on silent misses

  # --- Ported from aeon-aaron ---
  # Infra & health
  api-health: { enabled: false, schedule: "30 6 * * *" } # daily 06:30 UTC — pre-batch health probe of every configured API provider key (credit exhaustion / auth failure / outage) via scripts/prefetch-api-probe.sh; files/updates issues; notifies only on degradation or recovery
  # Markets & crypto
  fear-divergence: { enabled: false, schedule: "30 7 * * *" } # daily 07:30 UTC — conditional: fires only when Fear & Greed < 25; surfaces assets diverging from the BTC drawdown with narrative catalysts from memory; silent skip otherwise. Reads market-context.md (enable market-context first).
  picks-tracker: { enabled: false, schedule: "0 9 * * 0" } # Sunday 09:00 UTC — 30-day retrospective scoring token + prediction-market picks from logs against current prices; W/H/L + hit rate; honest record-keeping. Pairs with token-pick / monitor-polymarket.
  # Content pipeline
  article-queue: { enabled: false, schedule: "0 11 * * 0", var: "" } # Sunday — content planner: ranks content-gap signals + tracks multi-beat storylines into memory/topics/article-queue.md (folds in topic-momentum + beat-tracker; article skill picks it up via MEMORY.md). var: empty=combined | gaps | beats
  soul-builder: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — build a SOUL from any mix of sources (X handle, full name, links), drafting soul/SOUL.md + STYLE.md + examples so every content skill speaks in that voice. var: bare X handle, or structured brief "x=handle | name=Full Name | links=url1,url2". Powers the dashboard Soul → Build my soul button. XAI_API_KEY optional (name/links use built-in WebSearch/WebFetch).
  # Social
  mention-radar: { enabled: false, schedule: "25 7 2/2 * *", var: "" } # every other day — external web/social mentions of the operator's projects (discovery/confusion/friction/competitor taxonomy + engagement opportunities). var: comma-separated project names; falls back to MEMORY.md / memory/topics/projects.md
  # Sports

  # --- Ported from derivative instances (2026-06-29) ---
  # Security (pairs with vuln-scanner ↑ channel 5d)
  inbox-triage: { enabled: false, schedule: "30 11 * * *" } # daily 11:30 — GitHub notification-inbox triage (maintainer replies to disclosures/advisories/mentions)

  # Dev & repo
  feature: { enabled: false, schedule: "0 10 * * 6", var: "" } # build a feature + open PR. var: watched (default) | external:<owner/repo> | dormant[:<owner/repo>], append --fix-issues (folds in external-feature/repo-revive). GH_GLOBAL for external.

  # Research & content
  write-tweet: { enabled: false, schedule: "0 21 * * *", var: "" } # tweet studio. var: empty=drafts (10×5 tiers) | thread [topic] | remix [window]. Optional XAI_API_KEY (required for remix).
  bd-radar: { enabled: false, schedule: "20 7 * * *", var: "" } # daily 07:20 — BD radar: who's building/forking/integrating/mentioning your products → ranked leads. Products from memory/products.md. Quiet unless high-intent.

  # Product / ops (config: memory/products.md)
  product-pulse: { enabled: false, schedule: "15 7 * * *", var: "" } # product health: repo growth + X engagement + Vercel deploy fleet (folds in repo-pulse/content-performance/vercel-projects). var: empty/all | repo[:owner/repo] | content[:handle] | deploys[:team] | dry-run. Optional XAI/VERCEL keys.

  # Self-maintenance / meta
  memory-flush: { enabled: false, schedule: "30 23 * * *" } # daily — promote important recent log entries into MEMORY.md

  # Utilities / on-demand
  note-taking: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — capture + triage a note (PARA bucket, tags, recurring-theme detection) to memory/notes/. var: note text, optional source:<channel> prefix

  send-email: { enabled: false, schedule: "workflow_dispatch", var: "" } # on-demand — compose + send a 1:1 email to a named recipient via Resend (general sibling of disclosure-emailer). var: "to=… | subject=… | about=…"
  idea-forge: { enabled: false, schedule: "0 9 * * 1", var: "" } # weekly business-idea engine. var: empty/generate=timing-scored wedges | validate[:theme]=viability screen | memo[:theme]=2 evidence-backed memos
  # --- Fallback (must be last) ---
  heartbeat: { enabled: true, schedule: "0 8,14,20 * * *", var: "" } # ambient fleet-health check (default) — surfaces anything worth attention. var: empty=ambient check | <area>=ambient focused on that area | brief[:<area>]=priority brief (3 things to focus on, why now, what moved; folds in priority-brief)

# Reactive triggers — event-driven skill dispatch based on cron-state.json conditions.
# Skills with schedule: "reactive" are never cron-matched. Instead, the scheduler
# evaluates their trigger rules after processing cron skills.
#
# Format: trigger: { on: <source-skill>, when: "<condition>" }
# Conditions:
#   consecutive_failures >= N    — source skill failed N+ times in a row
#   success_rate < X             — source skill success rate below threshold
#   last_status = success        — source skill just succeeded (for chaining)
#
# Multiple triggers: trigger: [{ on: a, when: "..." }, { on: b, when: "..." }]
# Any matching trigger fires the skill (OR logic).
reactive:
  # skill-repair:
  #   trigger:
  #     - { on: "*", when: "consecutive_failures >= 3" }
  # autoresearch:
  #   trigger:
  #     - { on: skill-health, when: "last_status = success" }

# Chains — multi-step skill pipelines with parallel execution and output passing.
# Steps run sequentially; use parallel: [...] for concurrent execution within a step.
# Skills with consume: [...] receive prior step outputs injected into their context.
#
# Format:
#   chains:
#     chain-name:
#       schedule: "cron expression"
#       on_error: fail-fast          # fail-fast (default) | continue
#       steps:
#         - parallel: [skill-a, skill-b]
#         - skill: skill-c, consume: [skill-a, skill-b]
chains:
  # routine:
  #   schedule: "0 7 * * *"
  #   on_error: fail-fast
  #   steps:
  #     - parallel: [token-movers, paper-pick, issue-triage, hn-digest]
  #     - skill: routine, consume: [token-movers, paper-pick, issue-triage, hn-digest]

# Default model for all skills. Override per-run via workflow_dispatch.
# Options: claude-opus-4-8, claude-fable-5, claude-sonnet-5, claude-sonnet-4-6, claude-haiku-4-5-20251001
# (Grok harness model: grok-composer-2.5-fast — the only one that runs in CI)
model: grok-composer-2.5-fast

# Agent harness — which coding-agent CLI runs your skills.
#   claude (default) — Claude Code (`claude -p`); uses the AI Gateway below.
#   grok             — Grok Build (`grok`); logs in with your X account
#                      (GROK_CREDENTIALS, captured in the dashboard) or an
#                      XAI_API_KEY. Bypasses the gateway (grok has its own auth).
# Override per-skill with `harness: "grok"` in the skill entry, or per-run via
# the workflow_dispatch `harness` input. Default stays claude — everything
# already configured keeps working unchanged.
harness: grok

# AI Gateway — route Claude Code requests through an LLM provider.
#
# provider: auto (default) resolves at RUN TIME from whichever provider secret
# is set, in priority order — no need to re-pin when you add/remove a key:
#   claude (CLAUDE_CODE_OAUTH_TOKEN) → anthropic (ANTHROPIC_API_KEY) →
#   openrouter → bankr → usepod → venice → surplus → grok → direct (fallback)
# Override the order with the repo variable GATEWAY_ORDER (space-separated).
#
# Or PIN one explicitly: direct | bankr | openrouter | usepod | venice | surplus | grok.
# grok routes Claude Code at xAI's Anthropic-compatible api.x.ai (XAI_API_KEY) —
# this is the gateway path; to run the grok CLI itself, set `harness: grok` above.
# For Anthropic-compatible endpoints (direct), set repo variable ANTHROPIC_BASE_URL
# + secret ANTHROPIC_API_KEY. Example: https://api.deepseek.com/anthropic
# Bankr docs: https://docs.bankr.bot/llm-gateway/overview
gateway:
  provider: auto

# Output channels
channels:
  jsonrender:
    enabled: true # Set to true (or JSONRENDER_ENABLED=true as repo var) to write json-render specs

# Messaging integration
# Polls for messages every 5 minutes on Telegram/Discord/Slack.
telegram:
  enabled: true
